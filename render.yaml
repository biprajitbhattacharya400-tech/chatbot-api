services:
  - type: web
    name: chatbot-api
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
